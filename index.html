<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bochica — Inventaire</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f8fafc;min-height:100vh}
    .header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .logo-name{font-weight:900;font-size:22px;letter-spacing:4px;line-height:1}
    .logo-sub{font-size:10px;opacity:.7;letter-spacing:1px}
    .logo-bar{display:flex;height:2px;margin-top:3px;width:120px}
    .tabs{display:flex;background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;overflow-x:auto}
    .tab{padding:12px 20px;font-weight:600;font-size:14px;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;color:#64748b;white-space:nowrap}
    .tab.active{border-bottom:3px solid #3b82f6;color:#3b82f6}
    .content{padding:24px;max-width:1200px;margin:0 auto}
    .section-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .sec-btn{padding:7px 16px;border-radius:6px;border:1px solid #e2e8f0;cursor:pointer;font-weight:600;font-size:13px;background:#fff;color:#475569;transition:.15s}
    .sec-btn:hover{background:#f1f5f9}
    .sec-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
    .badge{background:#ef4444;color:#fff;border-radius:4px;padding:1px 5px;font-size:11px;margin-left:4px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
    .search-box{display:flex;align-items:center;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:6px 12px;gap:8px;flex:1;max-width:300px}
    .search-box input{border:none;outline:none;font-size:14px;color:#1e293b;width:100%;background:transparent}
    .btn-primary{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap}
    .btn-danger{background:#ef4444;color:#fff;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px;margin-right:4px}
    .btn-edit{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px;margin-right:4px}
    .btn-cancel{padding:8px 18px;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;background:#f8fafc;font-size:14px}
    .btn-admin{background:transparent;border:1px solid rgba(255,255,255,0.35);color:rgba(255,255,255,0.85);border-radius:6px;padding:5px 13px;cursor:pointer;font-size:12px;font-weight:500;backdrop-filter:blur(4px)}
    .btn-admin:hover{background:rgba(255,255,255,0.1)}
    .alert-pill{background:#ef4444;border-radius:4px;padding:5px 12px;font-size:13px;font-weight:600;color:#fff}
    table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
    th{padding:10px 12px;text-align:left;font-weight:600;font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;background:#f1f5f9}
    td{padding:10px 12px;vertical-align:middle;border-bottom:1px solid #e2e8f0}
    th:first-child,td:first-child{position:sticky;left:0;z-index:2;background:#f1f5f9;box-shadow:2px 0 4px rgba(0,0,0,.08)}
    tr td:first-child{background:#fff}
    .stock-input{width:72px;border:1px solid #cbd5e1;border-radius:6px;padding:4px 8px;text-align:center;font-size:14px;font-weight:600}
    .stock-input:focus{border-color:#3b82f6;outline:none;box-shadow:0 0 0 2px #bfdbfe}
    .status-badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap}
    .red{background:#fee2e2;border:2px solid #ef4444;color:#991b1b}
    .yellow{background:#fef9c3;border:2px solid #eab308;color:#854d0e}
    .green{background:#dcfce7;border:2px solid #22c55e;color:#166534}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .modal h3{font-size:17px;color:#1e293b}
    .close-btn{border:none;background:none;font-size:20px;cursor:pointer;color:#94a3b8}
    label{display:flex;flex-direction:column;gap:4px;font-size:13px;font-weight:600;color:#475569;margin-bottom:10px}
    input,select,textarea{padding:8px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;outline:none;width:100%}
    .form-row{display:flex;gap:12px}
    .form-row label{flex:1}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
    .field-hint{font-size:11px;color:#94a3b8;font-weight:400;margin-top:2px}
    .empty{text-align:center;color:#94a3b8;margin-top:60px;font-size:15px}
    .supplier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .supplier-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px}
    .tag{background:#eff6ff;color:#3b82f6;border-radius:12px;padding:2px 10px;font-size:12px;display:inline-block;margin:2px}
    .summary-cards{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .summary-card{flex:1;min-width:150px;border-radius:10px;padding:12px 16px;border:1px solid}
    .overflow{overflow-x:auto}
    .cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
    .cat-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px}
    .cat-item input{flex:1;border:1px solid #cbd5e1;border-radius:6px;padding:5px 10px;font-size:13px}
    .confirm-modal{max-width:380px}
    .confirm-msg{color:#475569;font-size:14px;margin-bottom:20px;line-height:1.6}
    /* PIN */
    .pin-pad{display:flex;flex-direction:column;align-items:center;gap:16px}
    .pin-display{display:flex;gap:10px;margin:8px 0}
    .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #cbd5e1;background:#fff;transition:.2s}
    .pin-dot.filled{background:#3b82f6;border-color:#3b82f6}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .pin-btn{width:64px;height:64px;border-radius:50%;border:2px solid #e2e8f0;background:#fff;font-size:22px;font-weight:700;cursor:pointer;color:#1e293b}
    .pin-btn:active{background:#eff6ff;border-color:#3b82f6}
    .pin-error{color:#ef4444;font-size:13px;font-weight:600;min-height:20px;text-align:center}
    @media(max-width:640px){
      .content{padding:12px}
      .search-box{max-width:100%}
      .mobile-cards{display:flex;flex-direction:column;gap:10px}
      .mobile-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px}
      .mobile-card.red{background:#fff5f5;border-color:#ef4444}
      .mobile-card.yellow{background:#fffbeb;border-color:#eab308}
    }
    @media(min-width:641px){.mobile-only{display:none}}
    @media(max-width:640px){.desktop-only{display:none}}
  </style>
</head>
<body>
<div id="app"></div>

<!-- MODAL PIN -->
<div id="modal-pin" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:340px">
    <div class="modal-header" style="justify-content:center">
      <h3>🔐 Connexion</h3>
    </div>
    <p style="text-align:center;color:#94a3b8;font-size:13px;margin-bottom:16px">Entrez votre code PIN</p>
    <div class="pin-pad">
      <div class="pin-display">
        <div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div>
        <div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <div class="pin-grid">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-btn" onclick="pinPress('${n}')">${n}</button>`).join("")}
        <button class="pin-btn" onclick="pinClear()" style="font-size:12px;color:#94a3b8">Effacer</button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn" onclick="pinBackspace()" style="font-size:18px">⌫</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL PRODUIT -->
<div id="modal-product" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-product-title">Ajouter un produit</h3>
      <button class="close-btn" onclick="closeProductModal()">✕</button>
    </div>
    <label>Nom du produit<input id="p-name" placeholder="ex: Tomates"/></label>
    <label>Section<select id="p-section"></select></label>
    <div class="form-row">
      <label>Unité d'inventaire
        <input id="p-unit" placeholder="ex: unité, litre, kg"/>
        <span class="field-hint">Comment vous comptez</span>
      </label>
      <label>Unité de commande
        <input id="p-orderunit" placeholder="ex: boîte, caisse"/>
        <span class="field-hint">Comment vous commandez</span>
      </label>
    </div>
    <div class="form-row">
      <label>Qté à commander
        <input id="p-orderqty" type="number" value="0"/>
        <span class="field-hint">En unités de commande</span>
      </label>
      <label>Minimum requis
        <input id="p-minimum" type="number" value="0"/>
        <span class="field-hint">En unités d'inventaire</span>
      </label>
    </div>
    <label>Fournisseur<select id="p-supplier"><option value="">— Aucun —</option></select></label>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeProductModal()">Annuler</button>
      <button class="btn-primary" onclick="saveProduct()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL CATÉGORIES -->
<div id="modal-category" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>🗂️ Gérer les catégories</h3>
      <button class="close-btn" onclick="closeCategoryModal()">✕</button>
    </div>
    <div id="cat-list" class="cat-list"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="cat-new" placeholder="Nouvelle catégorie..." style="flex:1"/>
      <button class="btn-primary" onclick="addCategory()">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL FOURNISSEUR -->
<div id="modal-supplier" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-supplier-title">Ajouter un fournisseur</h3>
      <button class="close-btn" onclick="closeSupplierModal()">✕</button>
    </div>
    <label>Nom du fournisseur<input id="s-name" placeholder="ex: Distribution ABC"/></label>
    <label>Téléphone<input id="s-contact" placeholder="ex: 514-555-0000"/></label>
    <label>Courriel<input id="s-email" placeholder="ex: commandes@abc.com"/></label>
    <label>Notes<textarea id="s-notes" style="height:70px;resize:vertical" placeholder="Jours de livraison, conditions..."></textarea></label>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSupplierModal()">Annuler</button>
      <button class="btn-primary" onclick="saveSupplier()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMATION -->
<div id="modal-confirm" class="modal-overlay" style="display:none">
  <div class="modal confirm-modal">
    <div class="modal-header">
      <h3 id="confirm-title">Confirmer</h3>
    </div>
    <p class="confirm-msg" id="confirm-msg"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Annuler</button>
      <button class="btn-danger" id="confirm-ok" onclick="confirmAction()">Supprimer</button>
    </div>
  </div>
</div>

<script>
// ── 🔐 CHANGEZ VOS CODES ICI ─────────────────────────────
const ADMIN_PIN    = "2024";
const EMPLOYEE_PIN = "1111";
// ─────────────────────────────────────────────────────────

const DEFAULT_SECTIONS = ["Cuisine","Emballage","Bar","Autre"];
const TODAY_KEY = new Date().toISOString().slice(0,10); // YYYY-MM-DD

firebase.initializeApp({
  apiKey: "AIzaSyC27HzALz_DoIN5huqGwVBsKTLHg37rUuc",
  authDomain: "bochica-inventaire.firebaseapp.com",
  projectId: "bochica-inventaire",
  storageBucket: "bochica-inventaire.firebasestorage.app",
  messagingSenderId: "261321722710",
  appId: "1:261321722710:web:5a7aa0039fa0fd1a20a4f7"
});
const db = firebase.firestore();

let products=[], suppliers=[], customSections=[];
let activeTab="inventaire", activeSection="Toutes";
let editingProductId=null, editingSupplierID=null;
let searchQuery="", isAdmin=false, isLoggedIn=false, pinBuffer="";
let pendingConfirm=null;

function genId(){ return Math.random().toString(36).slice(2,10); }
function getAllSections(){ return ["Toutes",...DEFAULT_SECTIONS,...customSections]; }

// Stock actuel = valeur du jour, sinon 0
function getCurrentStock(p){
  return p.stockByDay?.[TODAY_KEY] !== undefined ? Number(p.stockByDay[TODAY_KEY]) : 0;
}
function getStatus(p){
  const s=getCurrentStock(p), m=Number(p.minimum||0);
  if(s<=m) return "red";
  if(s<=m*1.2) return "yellow";
  return "green";
}
function statusLabel(st){ return st==="red"?"⚠️ Commander":st==="yellow"?"🟡 Bientôt bas":"✅ OK"; }

const statusOrder={"red":0,"yellow":1,"green":2};

// ── Firebase ──────────────────────────────────────────────
db.collection("products").onSnapshot(snap=>{
  products=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(isLoggedIn) render(); else showLogin();
});
db.collection("suppliers").onSnapshot(snap=>{
  suppliers=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(isLoggedIn) render();
});
db.collection("settings").doc("sections").onSnapshot(snap=>{
  customSections=snap.exists ? snap.data().custom||[] : [];
  if(isLoggedIn) render();
});

// ── Reset journalier automatique à minuit ─────────────────
function scheduleMidnightReset(){
  const now=new Date();
  const midnight=new Date(now);
  midnight.setDate(now.getDate()+1);
  midnight.setHours(0,0,10,0);
  setTimeout(()=>{ scheduleMidnightReset(); render(); }, midnight-now);
}
scheduleMidnightReset();

// ── Login ─────────────────────────────────────────────────
function showLogin(){
  document.getElementById("app").innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#1e293b,#334155);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
    <div style="margin-bottom:28px;text-align:center">
      <div style="font-weight:900;font-size:34px;letter-spacing:6px;color:#fff">BOCHICA</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.55);letter-spacing:2px;margin-top:4px">Restaurant Colombien</div>
      <div style="display:flex;height:3px;width:180px;margin:10px auto 0">
        <div style="flex:1;background:#f5a623"></div><div style="flex:1;background:#4a90e2"></div><div style="flex:1;background:#e74c3c"></div>
      </div>
    </div>
    <div style="background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:320px;box-shadow:0 25px 60px rgba(0,0,0,0.3)">
      <h2 style="text-align:center;color:#1e293b;font-size:18px;margin-bottom:6px">Connexion</h2>
      <p style="text-align:center;color:#94a3b8;font-size:13px;margin-bottom:20px">Entrez votre code PIN</p>
      <div class="pin-pad">
        <div class="pin-display">
          <div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div>
          <div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div>
        </div>
        <div class="pin-error" id="pin-error"></div>
        <div class="pin-grid">
          ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-btn" onclick="pinPress('${n}')">${n}</button>`).join("")}
          <button class="pin-btn" onclick="pinClear()" style="font-size:12px;color:#94a3b8">Effacer</button>
          <button class="pin-btn" onclick="pinPress('0')">0</button>
          <button class="pin-btn" onclick="pinBackspace()" style="font-size:18px">⌫</button>
        </div>
      </div>
    </div>
  </div>`;
}
function logout(){ isAdmin=false; isLoggedIn=false; pinBuffer=""; showLogin(); }

// ── PIN ───────────────────────────────────────────────────
function pinPress(d){ if(pinBuffer.length>=4) return; pinBuffer+=d; updatePinDots(); if(pinBuffer.length===4) checkPin(); }
function pinClear(){ pinBuffer=""; updatePinDots(); }
function pinBackspace(){ pinBuffer=pinBuffer.slice(0,-1); updatePinDots(); }
function updatePinDots(){
  for(let i=0;i<4;i++){ const d=document.getElementById("dot"+i); if(d) d.classList.toggle("filled",i<pinBuffer.length); }
}
function checkPin(){
  if(pinBuffer===ADMIN_PIN){ isAdmin=true; isLoggedIn=true; render(); }
  else if(pinBuffer===EMPLOYEE_PIN){ isAdmin=false; isLoggedIn=true; render(); }
  else { const e=document.getElementById("pin-error"); if(e) e.textContent="❌ Code PIN incorrect"; pinBuffer=""; updatePinDots(); }
}

// ── CONFIRM MODAL ─────────────────────────────────────────
function openConfirm(title, msg, action){
  pendingConfirm=action;
  document.getElementById("confirm-title").textContent=title;
  document.getElementById("confirm-msg").textContent=msg;
  document.getElementById("modal-confirm").style.display="flex";
}
function closeConfirm(){ document.getElementById("modal-confirm").style.display="none"; pendingConfirm=null; }
function confirmAction(){ if(pendingConfirm) pendingConfirm(); closeConfirm(); }

// ── RENDER ────────────────────────────────────────────────
function render(){
  const lowCount=products.filter(p=>["red","yellow"].includes(getStatus(p))).length;
  const toOrder=products.filter(p=>["red","yellow"].includes(getStatus(p)));
  const isMobile=window.innerWidth<=640;
  const allSec=getAllSections();

  const filtered=products
    .filter(p=>(activeSection==="Toutes"||p.section===activeSection)&&(searchQuery===""||p.name.toLowerCase().includes(searchQuery.toLowerCase())))
    .sort((a,b)=>statusOrder[getStatus(a)]-statusOrder[getStatus(b)]);

  let html=`
  <div class="header">
    <div>
      <div class="logo-name">BOCHICA</div>
      <div class="logo-sub">Restaurant Colombien</div>
      <div class="logo-bar"><div style="flex:1;background:#f5a623"></div><div style="flex:1;background:#4a90e2"></div><div style="flex:1;background:#e74c3c"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      ${lowCount>0?`<div class="alert-pill">⚠️ ${lowCount} à commander</div>`:""}
      <button class="btn-admin" onclick="logout()">${isAdmin?"👑 Admin":"👤 Employé"} — Déconnexion</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab ${activeTab==="inventaire"?"active":""}" onclick="setTab('inventaire')">📦 Inventaire</button>
    <button class="tab ${activeTab==="rapport"?"active":""}" onclick="setTab('rapport')">📋 Rapport${lowCount>0?` (${lowCount})`:""}</button>
    <button class="tab ${activeTab==="fournisseurs"?"active":""}" onclick="setTab('fournisseurs')">🏪 Fournisseurs</button>
  </div>
  <div class="content">`;

  // ── INVENTAIRE ──
  if(activeTab==="inventaire"){
    html+=`<div class="section-tabs">`;
    allSec.forEach(s=>{
      const cnt=s==="Toutes"
        ? products.filter(p=>["red","yellow"].includes(getStatus(p))).length
        : products.filter(p=>p.section===s&&["red","yellow"].includes(getStatus(p))).length;
      html+=`<button class="sec-btn ${s===activeSection?"active":""}" onclick="setSection('${s}')">${s}${cnt>0?`<span class="badge">${cnt}</span>`:""}</button>`;
    });
    if(isAdmin) html+=`<button class="sec-btn" onclick="openCategoryModal()" style="border-style:dashed;color:#94a3b8">⚙️ Catégories</button>`;
    html+=`</div>
    <div class="toolbar">
      <div class="search-box"><span style="color:#94a3b8">🔍</span><input type="text" placeholder="Rechercher..." value="${searchQuery}" oninput="setSearch(this.value)"/></div>
      ${isAdmin?`<button class="btn-primary" onclick="openProductModal()">+ Ajouter un produit</button>`:""}
    </div>`;

    if(!filtered.length){
      html+=`<div class="empty"><div style="font-size:40px;margin-bottom:8px">${searchQuery?"🔍":"📭"}</div>${searchQuery?`Aucun résultat pour "${searchQuery}"`:"Aucun produit dans cette section."}</div>`;
    } else if(isMobile){
      html+=`<div class="mobile-cards">`;
      filtered.forEach(p=>{
        const st=getStatus(p), stock=getCurrentStock(p);
        const sup=suppliers.find(s=>s.id===p.supplierId);
        html+=`<div class="mobile-card ${st}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div>
              <strong style="font-size:15px">${p.name}</strong>
              <div style="font-size:11px;color:#94a3b8">${p.unit||""}${activeSection==="Toutes"?` · ${p.section}`:""}</div>
            </div>
            <span class="status-badge ${st}">${statusLabel(st)}</span>
          </div>
          <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
            <div>
              <div style="font-size:10px;color:#64748b;font-weight:600;margin-bottom:4px">STOCK AUJOURD'HUI</div>
              <input class="stock-input" type="number" value="${stock||""}" placeholder="0"
                onchange="updateStock('${p.id}',this.value)"
                style="width:80px;height:38px;font-size:18px"/>
            </div>
            <div style="display:flex;gap:12px">
              <div style="text-align:center"><div style="font-size:10px;color:#64748b;font-weight:600">MIN</div><div style="font-size:16px;font-weight:600">${p.minimum||0}</div></div>
              <div style="text-align:center"><div style="font-size:10px;color:#64748b;font-weight:600">COMMANDE</div><div style="font-size:14px;font-weight:600;color:#3b82f6">${p.orderQty||0} ${p.orderUnit||""}</div></div>
            </div>
          </div>
          ${sup?`<div style="margin-top:8px;font-size:12px;color:#64748b">🏪 ${sup.name}</div>`:""}
          ${isAdmin?`<div style="display:flex;gap:6px;margin-top:10px">
            <button class="btn-edit" onclick="editProduct('${p.id}')">✏️ Modifier</button>
            <button class="btn-danger" onclick="askDeleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')">🗑️</button>
          </div>`:""}
        </div>`;
      });
      html+=`</div>`;
    } else {
      html+=`<div class="overflow"><table><thead><tr>
        <th>Produit</th>
        <th>Stock aujourd'hui</th>
        <th>Minimum</th><th>Fournisseur</th><th>Statut</th><th>À commander</th>
        ${isAdmin?"<th>Actions</th>":""}
      </tr></thead><tbody>`;
      filtered.forEach(p=>{
        const st=getStatus(p), stock=getCurrentStock(p);
        const sup=suppliers.find(s=>s.id===p.supplierId);
        const rowBg=st==="red"?"#fff5f5":st==="yellow"?"#fffbeb":"#fff";
        html+=`<tr style="background:${rowBg}">
          <td style="background:${rowBg} !important">
            <strong>${p.name}</strong>
            <div style="font-size:11px;color:#94a3b8">${p.unit||""}${activeSection==="Toutes"?` · ${p.section}`:""}</div>
          </td>
          <td>
            <input class="stock-input" type="number" value="${stock||""}" placeholder="0"
              onchange="updateStock('${p.id}',this.value)"/>
          </td>
          <td style="text-align:center">${p.minimum||0}</td>
          <td>${sup?sup.name:"—"}</td>
          <td><span class="status-badge ${st}">${statusLabel(st)}</span></td>
          <td style="font-weight:600;color:#3b82f6">${p.orderQty||0} <span style="font-size:11px;color:#94a3b8">${p.orderUnit||""}</span></td>
          ${isAdmin?`<td>
            <button class="btn-edit" onclick="editProduct('${p.id}')">✏️</button>
            <button class="btn-danger" onclick="askDeleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')">🗑️</button>
          </td>`:""}
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    }
  }

  // ── RAPPORT ──
  if(activeTab==="rapport"){
    html+=`<div class="toolbar">
      <div><h2 style="font-size:18px;color:#1e293b">Rapport de commande</h2>
      <p style="color:#64748b;font-size:13px;margin-top:4px">Produits sous le minimum ou à moins de 20% du seuil</p></div>
      <button class="btn-primary" ${!toOrder.length?"disabled":""} onclick="printReport()">🖨️ Exporter / Imprimer</button>
    </div>`;
    if(!toOrder.length){
      html+=`<div class="empty"><div style="font-size:48px;margin-bottom:8px">✅</div>Tous les produits sont en quantité suffisante !</div>`;
    } else {
      const redCnt=toOrder.filter(p=>getStatus(p)==="red").length;
      const yelCnt=toOrder.filter(p=>getStatus(p)==="yellow").length;
      html+=`<div class="summary-cards">
        <div class="summary-card red" style="border-color:#ef4444"><div style="font-weight:700;font-size:22px;color:#991b1b">${redCnt}</div><div style="font-size:13px;color:#991b1b">⚠️ À commander immédiatement</div></div>
        <div class="summary-card yellow" style="border-color:#eab308"><div style="font-weight:700;font-size:22px;color:#854d0e">${yelCnt}</div><div style="font-size:13px;color:#854d0e">🟡 Bientôt bas</div></div>
      </div>`;
      getAllSections().filter(s=>s!=="Toutes").forEach(section=>{
        const items=toOrder.filter(p=>p.section===section).sort((a,b)=>statusOrder[getStatus(a)]-statusOrder[getStatus(b)]);
        if(!items.length) return;
        html+=`<div style="margin-bottom:24px">
          <h3 style="font-size:15px;color:#475569;border-bottom:2px solid #e2e8f0;padding-bottom:6px;margin-bottom:10px">📁 ${section}</h3>
          <div class="overflow"><table><thead><tr>
            <th>Produit</th><th>Stock actuel</th><th>Minimum</th><th>À commander</th><th>Fournisseur</th><th>Contact</th><th>Statut</th>
          </tr></thead><tbody>`;
        items.forEach(p=>{
          const st=getStatus(p), stock=getCurrentStock(p);
          const sup=suppliers.find(s=>s.id===p.supplierId);
          html+=`<tr style="background:${st==="red"?"#fff5f5":"#fffbeb"}">
            <td><strong>${p.name}</strong><br/><span style="font-size:11px;color:#94a3b8">${p.unit||""}</span></td>
            <td class="${st}" style="font-weight:700;text-align:center">${stock}</td>
            <td style="text-align:center">${p.minimum||0}</td>
            <td style="font-weight:700;color:#3b82f6">${p.orderQty||0} ${p.orderUnit||""}</td>
            <td>${sup?sup.name:"—"}</td><td>${sup?sup.contact||"—":"—"}</td>
            <td><span class="status-badge ${st}">${statusLabel(st)}</span></td>
          </tr>`;
        });
        html+=`</tbody></table></div></div>`;
      });
    }
  }

  // ── FOURNISSEURS ──
  if(activeTab==="fournisseurs"){
    html+=`<div class="toolbar">
      <h2 style="font-size:18px;color:#1e293b">Fournisseurs</h2>
      ${isAdmin?`<button class="btn-primary" onclick="openSupplierModal()">+ Ajouter un fournisseur</button>`:""}
    </div>`;
    if(!suppliers.length){
      html+=`<div class="empty"><div style="font-size:40px;margin-bottom:8px">🏪</div>Aucun fournisseur enregistré.</div>`;
    } else {
      html+=`<div class="supplier-grid">`;
      suppliers.forEach(s=>{
        const linked=products.filter(p=>p.supplierId===s.id);
        html+=`<div class="supplier-card">
          <div style="display:flex;justify-content:space-between">
            <div>
              <div style="font-weight:700;font-size:16px;color:#1e293b">🏪 ${s.name}</div>
              ${s.contact?`<div style="color:#64748b;font-size:13px;margin-top:4px">📞 ${s.contact}</div>`:""}
              ${s.email?`<div style="color:#64748b;font-size:13px">✉️ ${s.email}</div>`:""}
              ${s.notes?`<div style="color:#94a3b8;font-size:12px;margin-top:6px;font-style:italic">${s.notes}</div>`:""}
            </div>
            ${isAdmin?`<div style="display:flex;gap:4px">
              <button class="btn-edit" onclick="editSupplier('${s.id}')">✏️</button>
              <button class="btn-danger" onclick="askDeleteSupplier('${s.id}','${s.name.replace(/'/g,"\\'")}')">🗑️</button>
            </div>`:""}
          </div>
          ${linked.length?`<div style="margin-top:12px;border-top:1px solid #f1f5f9;padding-top:10px">
            <div style="font-size:11px;color:#94a3b8;margin-bottom:4px;font-weight:600">PRODUITS LIÉS</div>
            ${linked.map(p=>`<span class="tag">${p.name}</span>`).join("")}
          </div>`:""}
        </div>`;
      });
      html+=`</div>`;
    }
  }

  html+=`</div>`;
  document.getElementById("app").innerHTML=html;
  updateSelects();
}

window.addEventListener("resize",()=>{ if(isLoggedIn) render(); });
function setTab(t){ activeTab=t; render(); }
function setSection(s){ activeSection=s; searchQuery=""; render(); }
function setSearch(v){ searchQuery=v; render(); }

// ── STOCK UPDATE ──────────────────────────────────────────
async function updateStock(id, val){
  const p=products.find(x=>x.id===id); if(!p) return;
  const stockByDay={...p.stockByDay||{},[TODAY_KEY]: val===""?"":Number(val)};
  await db.collection("products").doc(id).update({stockByDay});
}

// ── DELETE CONFIRMATIONS ──────────────────────────────────
function askDeleteProduct(id, name){
  openConfirm("🗑️ Supprimer le produit", `Voulez-vous vraiment supprimer "${name}" ? Cette action est irréversible.`, ()=>db.collection("products").doc(id).delete());
}
function askDeleteSupplier(id, name){
  openConfirm("🗑️ Supprimer le fournisseur", `Voulez-vous vraiment supprimer "${name}" ? Cette action est irréversible.`, ()=>db.collection("suppliers").doc(id).delete());
}

// ── PRODUCT MODAL ─────────────────────────────────────────
function openProductModal(){
  if(!isAdmin) return;
  editingProductId=null;
  document.getElementById("modal-product-title").textContent="Ajouter un produit";
  ["p-name","p-unit","p-orderunit"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("p-orderqty").value=0;
  document.getElementById("p-minimum").value=0;
  document.getElementById("p-supplier").value="";
  document.getElementById("modal-product").style.display="flex";
}
function closeProductModal(){ document.getElementById("modal-product").style.display="none"; }

function editProduct(id){
  if(!isAdmin) return;
  const p=products.find(x=>x.id===id); if(!p) return;
  editingProductId=id;
  document.getElementById("modal-product-title").textContent="Modifier le produit";
  document.getElementById("p-name").value=p.name||"";
  document.getElementById("p-unit").value=p.unit||"";
  document.getElementById("p-orderunit").value=p.orderUnit||"";
  document.getElementById("p-orderqty").value=p.orderQty||0;
  document.getElementById("p-minimum").value=p.minimum||0;
  document.getElementById("p-section").value=p.section||DEFAULT_SECTIONS[0];
  document.getElementById("p-supplier").value=p.supplierId||"";
  document.getElementById("modal-product").style.display="flex";
}

async function saveProduct(){
  const name=document.getElementById("p-name").value.trim(); if(!name) return alert("Entrez un nom.");
  const data={name,unit:document.getElementById("p-unit").value,orderUnit:document.getElementById("p-orderunit").value,
    orderQty:Number(document.getElementById("p-orderqty").value),minimum:Number(document.getElementById("p-minimum").value),
    section:document.getElementById("p-section").value,supplierId:document.getElementById("p-supplier").value};
  if(editingProductId){
    const p=products.find(x=>x.id===editingProductId);
    await db.collection("products").doc(editingProductId).set({...p,...data,id:editingProductId});
  } else {
    const id=genId();
    await db.collection("products").doc(id).set({...data,id,stockByDay:{}});
  }
  closeProductModal();
}

// ── CATEGORY MODAL ────────────────────────────────────────
function openCategoryModal(){
  renderCatList();
  document.getElementById("cat-new").value="";
  document.getElementById("modal-category").style.display="flex";
}
function closeCategoryModal(){ document.getElementById("modal-category").style.display="none"; }

function renderCatList(){
  const list=document.getElementById("cat-list"); if(!list) return;
  if(!customSections.length){ list.innerHTML=`<p style="color:#94a3b8;font-size:13px;text-align:center;margin-bottom:8px">Aucune catégorie personnalisée</p>`; return; }
  list.innerHTML=customSections.map((s,i)=>`
    <div class="cat-item">
      <input value="${s}" id="cat-edit-${i}" onblur="renameCategory(${i},this.value)"/>
      <button class="btn-danger" onclick="askDeleteCategory(${i},'${s.replace(/'/g,"\\'")}')">🗑️</button>
    </div>`).join("");
}

async function addCategory(){
  const name=document.getElementById("cat-new").value.trim(); if(!name) return;
  if(DEFAULT_SECTIONS.includes(name)||customSections.includes(name)) return alert("Cette catégorie existe déjà.");
  const updated=[...customSections,name];
  await db.collection("settings").doc("sections").set({custom:updated});
  document.getElementById("cat-new").value="";
  renderCatList();
}

async function renameCategory(i, newName){
  const trimmed=newName.trim(); if(!trimmed||trimmed===customSections[i]) return;
  const updated=[...customSections]; updated[i]=trimmed;
  await db.collection("settings").doc("sections").set({custom:updated});
}

function askDeleteCategory(i, name){
  openConfirm("🗑️ Supprimer la catégorie", `Voulez-vous vraiment supprimer la catégorie "${name}" ? Les produits de cette catégorie ne seront pas supprimés.`, async()=>{
    const updated=customSections.filter((_,j)=>j!==i);
    await db.collection("settings").doc("sections").set({custom:updated});
    renderCatList();
  });
}

// ── SUPPLIER MODAL ────────────────────────────────────────
function openSupplierModal(){ if(!isAdmin) return; editingSupplierID=null; document.getElementById("modal-supplier-title").textContent="Ajouter un fournisseur"; ["s-name","s-contact","s-email","s-notes"].forEach(id=>document.getElementById(id).value=""); document.getElementById("modal-supplier").style.display="flex"; }
function closeSupplierModal(){ document.getElementById("modal-supplier").style.display="none"; }

function editSupplier(id){
  if(!isAdmin) return;
  const s=suppliers.find(x=>x.id===id); if(!s) return;
  editingSupplierID=id;
  document.getElementById("modal-supplier-title").textContent="Modifier le fournisseur";
  document.getElementById("s-name").value=s.name||"";
  document.getElementById("s-contact").value=s.contact||"";
  document.getElementById("s-email").value=s.email||"";
  document.getElementById("s-notes").value=s.notes||"";
  document.getElementById("modal-supplier").style.display="flex";
}

async function saveSupplier(){
  const name=document.getElementById("s-name").value.trim(); if(!name) return alert("Entrez un nom.");
  const data={name,contact:document.getElementById("s-contact").value,email:document.getElementById("s-email").value,notes:document.getElementById("s-notes").value};
  if(editingSupplierID){ await db.collection("suppliers").doc(editingSupplierID).set({...data,id:editingSupplierID}); }
  else { const id=genId(); await db.collection("suppliers").doc(id).set({...data,id}); }
  closeSupplierModal();
}

function updateSelects(){
  const sel=document.getElementById("p-supplier"); if(!sel) return;
  const cur=sel.value;
  sel.innerHTML=`<option value="">— Aucun —</option>${suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join("")}`;
  sel.value=cur;
  const sec=document.getElementById("p-section"); if(!sec) return;
  const allSec=getAllSections().filter(s=>s!=="Toutes");
  sec.innerHTML=allSec.map(s=>`<option value="${s}">${s}</option>`).join("");
}

function printReport(){
  const toOrder=products.filter(p=>["red","yellow"].includes(getStatus(p))).sort((a,b)=>statusOrder[getStatus(a)]-statusOrder[getStatus(b)]);
  const rows=toOrder.map(p=>{
    const sup=suppliers.find(s=>s.id===p.supplierId), st=getStatus(p), stock=getCurrentStock(p);
    return `<tr style="background:${st==="red"?"#fff5f5":"#fffbeb"}">
      <td>${p.name}<br/><small style="color:#94a3b8">${p.unit||""}</small></td>
      <td>${p.section}</td><td>${stock}</td><td>${p.minimum||0}</td>
      <td>${p.orderQty||0} ${p.orderUnit||""}</td>
      <td>${sup?sup.name:"—"}</td><td>${sup?sup.contact||"—":"—"}</td>
      <td>${statusLabel(st)}</td></tr>`;
  }).join("");
  const win=window.open("","_blank");
  win.document.write(`<!DOCTYPE html><html><head><title>Rapport Bochica</title>
  <style>body{font-family:system-ui,sans-serif;padding:32px}table{width:100%;border-collapse:collapse;font-size:13px}th{padding:10px;background:#f1f5f9;text-align:left;font-size:11px;text-transform:uppercase;color:#64748b}td{padding:10px;border-bottom:1px solid #e2e8f0}@media print{button{display:none}}</style></head>
  <body>
  <div style="font-size:28px;font-weight:900;letter-spacing:4px">BOCHICA</div>
  <div style="font-size:14px;color:#475569;margin-bottom:4px">Restaurant Colombien</div>
  <div style="display:flex;height:3px;width:220px;margin-bottom:16px"><div style="flex:1;background:#f5a623"></div><div style="flex:1;background:#4a90e2"></div><div style="flex:1;background:#e74c3c"></div></div>
  <h2>Rapport de commande — ${new Date().toLocaleDateString("fr-CA",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</h2>
  <table><thead><tr><th>Produit</th><th>Section</th><th>Stock actuel</th><th>Minimum</th><th>À commander</th><th>Fournisseur</th><th>Contact</th><th>Statut</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <br/><button onclick="window.print()" style="background:#3b82f6;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer">🖨️ Imprimer</button>
  </body></html>`);
  win.document.close();
}
</script>
</body>
</html>
