<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bochica — Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--surface3:#e2e8f0;
  --border:#e2e8f0;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --accent:#6366f1;--accent2:#818cf8;
  --header-from:#1e2130;--header-to:#252a3d;
}
.dark{
  --bg:#0f1117;--surface:#1a1f2e;--surface2:#0f1117;--surface3:#252a3d;
  --border:#2d3348;--text:#e2e8f0;--text2:#94a3b8;--text3:#4a5568;
  --accent:#818cf8;--accent2:#6366f1;
  --header-from:#080a12;--header-to:#0f1117;
}
    body{font-family:system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);transition:background .2s,color .2s}
    .app-wrap{display:flex;min-height:100vh}
    .sidebar{width:220px;background:linear-gradient(180deg,var(--header-from),var(--header-to));display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s}
    .sidebar.hidden{transform:translateX(-220px)}
    .sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sidebar-logo .logo-name{font-weight:900;font-size:18px;letter-spacing:3px;color:#fff;line-height:1}
    .sidebar-logo .logo-sub{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-top:2px}
    .sidebar-logo .logo-bar{display:flex;height:2px;width:80px;margin-top:6px}
    .sidebar-nav{flex:1;padding:10px 0;overflow-y:auto}
    .nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:1.5px;padding:14px 18px 4px;text-transform:uppercase}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;border-left:3px solid transparent;transition:.15s}
    .nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .nav-item.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:var(--accent2)}
    .nav-item .icon{font-size:16px;width:20px;text-align:center}
    .sidebar-bottom{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px}
    .btn-icon-sm{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.75);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px}
    .btn-icon-sm:hover{background:rgba(255,255,255,.1);color:#fff}
    .main{margin-left:220px;flex:1;display:flex;flex-direction:column;transition:margin .25s}
    .main.full{margin-left:0}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50}
    .topbar-title{font-weight:700;font-size:17px;color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .page{padding:24px;max-width:1100px;margin:0 auto;width:100%}
    .btn{border:none;border-radius:8px;padding:8px 16px;font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{opacity:.9}
    .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
    .btn-danger-sm{background:#ef4444;color:#fff;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px}
    .btn-cancel{padding:8px 18px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface);color:var(--text);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
    .stat-num{font-size:28px;font-weight:800;margin-bottom:2px}
    .stat-label{font-size:12px;color:var(--text3);font-weight:500}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:9px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:1px solid var(--border)}
    td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
    tr:last-child td{border-bottom:none}
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .overflow{overflow-x:auto}
    .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
    .search-box{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;gap:8px;flex:1;max-width:280px}
    .search-box input{border:none;outline:none;font-size:14px;color:var(--text);width:100%;background:transparent}
    .badge-pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block}
    .red{background:#fef2f2;border:1.5px solid #fca5a5;color:#991b1b}
.yellow{background:#fffbeb;border:1.5px solid #fcd34d;color:#92400e}
.green{background:#f0fdf4;border:1.5px solid #86efac;color:#166534}
.blue{background:#eef2ff;border:1.5px solid #a5b4fc;color:#3730a3}
.dark .red{background:#3b0f0f;border-color:#f87171;color:#fca5a5}
.dark .yellow{background:#3b2a00;border-color:#fbbf24;color:#fcd34d}
.dark .green{background:#052e16;border-color:#4ade80;color:#86efac}
.dark .blue{background:#1e1b4b;border-color:#818cf8;color:#c7d2fe}
    .sec-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .sec-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-weight:600;font-size:13px;background:var(--surface);color:var(--text2);white-space:nowrap}
    .sec-btn:hover{background:var(--surface2)}
    .sec-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .badge-count{background:#ef4444;color:#fff;border-radius:4px;padding:1px 5px;font-size:10px;margin-left:3px}
    .schedule-grid{display:grid;grid-template-columns:140px repeat(7,1fr);gap:4px;font-size:12px}
    .sch-header{background:var(--surface2);border-radius:6px;padding:6px;text-align:center;font-weight:600;color:var(--text2)}
    .sch-name{background:var(--surface2);border-radius:6px;padding:6px 10px;font-weight:600;color:var(--text);display:flex;align-items:center}
    .sch-cell{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px;min-height:42px;cursor:pointer;transition:.15s}
    .sch-cell:hover{border-color:var(--accent);background:var(--surface2)}
    .sch-cell.has-shift{background:#eef2ff;border-color:#6366f1}
.dark .sch-cell.has-shift{background:#1e1b4b;border-color:#818cf8}
    .shift-tag{background:var(--accent);color:#fff;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
    .task-col{background:var(--surface2);border-radius:12px;padding:14px;min-height:200px}
    .task-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:4px}
    .task-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer}
    .task-card:hover{border-color:var(--accent)}
    .task-prio{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
    .menu-item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .menu-item-card.unavailable{opacity:.55}
    .price-tag{font-weight:700;font-size:16px;color:var(--accent)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{background:var(--surface);border-radius:14px;padding:24px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto;color:var(--text)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .modal h3{font-size:17px;color:var(--text)}
    .close-btn{border:none;background:none;font-size:20px;cursor:pointer;color:var(--text3)}
    label{display:flex;flex-direction:column;gap:4px;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}
    input,select,textarea{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;width:100%;background:var(--surface);color:var(--text)}
    input:focus,select:focus,textarea:focus{border-color:var(--accent)}
    .form-row{display:flex;gap:12px}
    .form-row label{flex:1}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .field-hint{font-size:11px;color:var(--text3);font-weight:400;margin-top:2px}
    .inv-card{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:10px}
    .inv-card-body{display:flex;gap:10px;margin-top:10px}
    .inv-card-block{background:var(--surface2);border-radius:8px;padding:10px 14px;flex:1}
    .inv-card-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-bottom:4px}
    .inv-card-value{font-weight:700;font-size:22px}
    .inv-card-sub{font-size:10px;color:var(--text3);margin-top:4px}
    .note-badge{font-size:11px;color:var(--text3);font-style:italic;margin-top:4px}
    .section-tabs{display:flex;gap:6px;flex-wrap:nowrap;overflow:hidden;align-items:center;margin-bottom:14px}
    .section-tabs.expanded{flex-wrap:wrap}
    .sec-toggle{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:14px;color:var(--text2);flex-shrink:0}
    .drag-handle{cursor:grab;color:var(--text3);padding:0 6px;font-size:18px;user-select:none}
    tr.dragging{opacity:.4}
    tr.drag-over td{border-top:2px solid var(--accent)}
    .menu-wrap{position:relative;display:inline-block}
    .dots-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:2px 6px;border-radius:4px;line-height:1}
    .dots-btn:hover{background:var(--surface2)}
    .dropdown{position:absolute;right:0;top:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:200;min-width:180px;overflow:hidden;display:none}
    .dropdown.open{display:block}
    .dropdown button{display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text);text-align:left}
    .dropdown button:hover{background:var(--surface2)}
    .dropdown .sep{height:1px;background:var(--border);margin:2px 0}
    .pin-pad{display:flex;flex-direction:column;align-items:center;gap:14px}
    .pin-display{display:flex;gap:10px}
    .pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);background:var(--surface);transition:.2s}
    .pin-dot.filled{background:var(--accent);border-color:var(--accent)}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .pin-btn{width:62px;height:62px;border-radius:50%;border:2px solid var(--border);background:var(--surface);font-size:20px;font-weight:700;cursor:pointer;color:var(--text)}
    .pin-btn:active{background:var(--surface2);border-color:var(--accent)}
    .pin-error{color:#ef4444;font-size:13px;font-weight:600;min-height:18px;text-align:center}
    .empty{text-align:center;color:var(--text3);margin-top:60px;font-size:15px}
    .col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px}
    .alert-pill{background:#ef4444;border-radius:4px;padding:4px 10px;font-size:13px;font-weight:700;color:#fff}
    .stock-input{border:1px solid var(--border);border-radius:6px;padding:4px 8px;text-align:center;font-size:14px;font-weight:600;background:var(--surface);color:var(--text)}
    .stock-input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px #bfdbfe}
    .archived-banner{background:#fef9c3;border:1px solid #eab308;border-radius:8px;padding:8px 14px;margin-bottom:14px;font-size:13px;color:#854d0e;font-weight:600;display:flex;justify-content:space-between;align-items:center}
    .dark .archived-banner{background:#451a03;border-color:#f59e0b;color:#fcd34d}
    .log-item{border-bottom:1px solid var(--border);padding:10px 0;font-size:13px}
    .log-item:last-child{border-bottom:none}
    .cat-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
    .cat-item input{flex:1}
    .supplier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .supplier-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
    .tag{background:var(--surface2);color:var(--accent);border-radius:12px;padding:2px 10px;font-size:12px;display:inline-block;margin:2px}
    .summary-cards{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .summary-card{flex:1;min-width:140px;border-radius:10px;padding:12px 16px;border:1px solid;background:var(--surface)}
    @media(max-width:768px){
      .sidebar{transform:translateX(-220px)}
      .sidebar.mobile-open{transform:translateX(0)}
      .main{margin-left:0}
      .task-cols{grid-template-columns:1fr}
      .schedule-grid{grid-template-columns:100px repeat(7,1fr);font-size:10px}
      .page{padding:16px}
      .topbar{padding:10px 16px}
    }
  </style>
</head>
<body>
<div id="login-screen"></div>
<div id="app-shell" style="display:none">
  <div class="app-wrap">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-name">BOCHICA</div>
        <div class="logo-sub">Restaurant Colombien</div>
        <div class="logo-bar">
          <div style="flex:1;background:#f5a623"></div>
          <div style="flex:1;background:#4a90e2"></div>
          <div style="flex:1;background:#e74c3c"></div>
        </div>
      </div>
      <div class="sidebar-nav" id="sidebar-nav"></div>
      <div class="sidebar-bottom">
        <button class="btn-icon-sm" onclick="toggleDark()" title="Mode sombre" id="dark-btn">🌙</button>
        <button class="btn-icon-sm" onclick="logout()" title="Déconnexion">↩ Déconnexion</button>
      </div>
    </div>
    <div class="main" id="main-area">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn-icon-sm" onclick="toggleSidebar()" style="border:1px solid var(--border);color:var(--text2)">☰</button>
          <span class="topbar-title" id="topbar-title">Inventaire</span>
        </div>
        <div class="topbar-right">
          <span id="topbar-alert"></span>
          <span style="font-size:13px;color:var(--text3)" id="topbar-role"></span>
        </div>
      </div>
      <div id="page-content"></div>
    </div>
  </div>
</div>
<div id="modals"></div>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/inventaire.js"></script>
<script src="js/modals-produits.js"></script>
<script src="js/pages-secondaires.js"></script>
<script src="js/pages-admin.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/auth.js"></script>
<script src="js/firebase-listeners.js"></script>

<script>
  initDark();
  if (!restoreSession()) showLogin();
</script>
</body>
</html>
