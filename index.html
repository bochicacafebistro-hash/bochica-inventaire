<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bochica — Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;--surface3:#e2e8f0;
      --border:#e2e8f0;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
      --accent:#3b82f6;--accent2:#60a5fa;
      --header-from:#1e293b;--header-to:#334155;
    }
    .dark{
      --bg:#0f172a;--surface:#1e293b;--surface2:#0f172a;--surface3:#334155;
      --border:#334155;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
      --accent:#60a5fa;--accent2:#3b82f6;
      --header-from:#020617;--header-to:#0f172a;
    }
    body{font-family:system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);transition:background .2s,color .2s}

    /* LAYOUT */
    .app-wrap{display:flex;min-height:100vh}
    .sidebar{width:220px;background:linear-gradient(180deg,var(--header-from),var(--header-to));display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s}
    .sidebar.hidden{transform:translateX(-220px)}
    .sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sidebar-logo .logo-name{font-weight:900;font-size:18px;letter-spacing:3px;color:#fff;line-height:1}
    .sidebar-logo .logo-sub{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-top:2px}
    .sidebar-logo .logo-bar{display:flex;height:2px;width:80px;margin-top:6px}
    .sidebar-nav{flex:1;padding:10px 0;overflow-y:auto}
    .nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:1.5px;padding:14px 18px 4px;text-transform:uppercase}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;border-left:3px solid transparent;transition:.15s}
    .nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .nav-item.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:var(--accent2)}
    .nav-item .icon{font-size:16px;width:20px;text-align:center}
    .sidebar-bottom{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px}
    .btn-icon-sm{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.75);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px}
    .btn-icon-sm:hover{background:rgba(255,255,255,.1);color:#fff}

    .main{margin-left:220px;flex:1;display:flex;flex-direction:column;transition:margin .25s}
    .main.full{margin-left:0}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50}
    .topbar-title{font-weight:700;font-size:17px;color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .page{padding:24px;max-width:1100px;margin:0 auto;width:100%}

    /* BUTTONS */
    .btn{border:none;border-radius:8px;padding:8px 16px;font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{opacity:.9}
    .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
    .btn-danger-sm{background:#ef4444;color:#fff;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px}
    .btn-cancel{padding:8px 18px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface);color:var(--text);font-size:14px}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
    .stat-num{font-size:28px;font-weight:800;margin-bottom:2px}
    .stat-label{font-size:12px;color:var(--text3);font-weight:500}

    /* TABLE */
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:9px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:1px solid var(--border)}
    td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
    tr:last-child td{border-bottom:none}
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .overflow{overflow-x:auto}

    /* TOOLBAR */
    .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
    .search-box{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;gap:8px;flex:1;max-width:280px}
    .search-box input{border:none;outline:none;font-size:14px;color:var(--text);width:100%;background:transparent}

    /* BADGE */
    .badge-pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block}
    .red{background:#fee2e2;border:2px solid #ef4444;color:#991b1b}
    .yellow{background:#fef9c3;border:2px solid #eab308;color:#854d0e}
    .green{background:#dcfce7;border:2px solid #22c55e;color:#166534}
    .blue{background:#eff6ff;border:2px solid #3b82f6;color:#1d4ed8}
    .dark .red{background:#450a0a;border-color:#ef4444;color:#fca5a5}
    .dark .yellow{background:#451a03;border-color:#f59e0b;color:#fcd34d}
    .dark .green{background:#052e16;border-color:#22c55e;color:#86efac}
    .dark .blue{background:#0c1a3a;border-color:#3b82f6;color:#93c5fd}

    /* SECTION TABS */
    .sec-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .sec-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-weight:600;font-size:13px;background:var(--surface);color:var(--text2);white-space:nowrap}
    .sec-btn:hover{background:var(--surface2)}
    .sec-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .badge-count{background:#ef4444;color:#fff;border-radius:4px;padding:1px 5px;font-size:10px;margin-left:3px}

    /* SCHEDULE */
    .schedule-grid{display:grid;grid-template-columns:140px repeat(7,1fr);gap:4px;font-size:12px}
    .sch-header{background:var(--surface2);border-radius:6px;padding:6px;text-align:center;font-weight:600;color:var(--text2)}
    .sch-name{background:var(--surface2);border-radius:6px;padding:6px 10px;font-weight:600;color:var(--text);display:flex;align-items:center}
    .sch-cell{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px;min-height:42px;cursor:pointer;transition:.15s}
    .sch-cell:hover{border-color:var(--accent);background:var(--surface2)}
    .sch-cell.has-shift{background:#eff6ff;border-color:#3b82f6}
    .dark .sch-cell.has-shift{background:#0c1a3a;border-color:#3b82f6}
    .shift-tag{background:var(--accent);color:#fff;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}

    /* TASKS */
    .task-col{background:var(--surface2);border-radius:12px;padding:14px;min-height:200px}
    .task-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:4px}
    .task-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer}
    .task-card:hover{border-color:var(--accent)}
    .task-prio{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}

    /* MENU */
    .menu-item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .menu-item-card.unavailable{opacity:.55}
    .price-tag{font-weight:700;font-size:16px;color:var(--accent)}

    /* MODALS */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{background:var(--surface);border-radius:14px;padding:24px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto;color:var(--text)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .modal h3{font-size:17px;color:var(--text)}
    .close-btn{border:none;background:none;font-size:20px;cursor:pointer;color:var(--text3)}
    label{display:flex;flex-direction:column;gap:4px;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}
    input,select,textarea{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;width:100%;background:var(--surface);color:var(--text)}
    input:focus,select:focus,textarea:focus{border-color:var(--accent)}
    .form-row{display:flex;gap:12px}
    .form-row label{flex:1}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .field-hint{font-size:11px;color:var(--text3);font-weight:400;margin-top:2px}

    /* INVENTORY CARDS */
    .inv-card{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:10px}
    .inv-card-body{display:flex;gap:10px;margin-top:10px}
    .inv-card-block{background:var(--surface2);border-radius:8px;padding:10px 14px;flex:1}
    .inv-card-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-bottom:4px}
    .inv-card-value{font-weight:700;font-size:22px}
    .inv-card-sub{font-size:10px;color:var(--text3);margin-top:4px}
    .note-badge{font-size:11px;color:var(--text3);font-style:italic;margin-top:4px}

    /* SECTION TABS inventory */
    .section-tabs{display:flex;gap:6px;flex-wrap:nowrap;overflow:hidden;align-items:center;margin-bottom:14px}
    .section-tabs.expanded{flex-wrap:wrap}
    .sec-toggle{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:14px;color:var(--text2);flex-shrink:0}

    /* DRAG */
    .drag-handle{cursor:grab;color:var(--text3);padding:0 6px;font-size:18px;user-select:none}
    tr.dragging{opacity:.4}
    tr.drag-over td{border-top:2px solid var(--accent)}

    /* DROPDOWN */
    .menu-wrap{position:relative;display:inline-block}
    .dots-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:2px 6px;border-radius:4px;line-height:1}
    .dots-btn:hover{background:var(--surface2)}
    .dropdown{position:absolute;right:0;top:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:200;min-width:180px;overflow:hidden;display:none}
    .dropdown.open{display:block}
    .dropdown button{display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text);text-align:left}
    .dropdown button:hover{background:var(--surface2)}
    .dropdown .sep{height:1px;background:var(--border);margin:2px 0}

    /* PIN */
    .pin-pad{display:flex;flex-direction:column;align-items:center;gap:14px}
    .pin-display{display:flex;gap:10px}
    .pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);background:var(--surface);transition:.2s}
    .pin-dot.filled{background:var(--accent);border-color:var(--accent)}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .pin-btn{width:62px;height:62px;border-radius:50%;border:2px solid var(--border);background:var(--surface);font-size:20px;font-weight:700;cursor:pointer;color:var(--text)}
    .pin-btn:active{background:var(--surface2);border-color:var(--accent)}
    .pin-error{color:#ef4444;font-size:13px;font-weight:600;min-height:18px;text-align:center}

    /* MISC */
    .empty{text-align:center;color:var(--text3);margin-top:60px;font-size:15px}
    .col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px}
    .alert-pill{background:#ef4444;border-radius:4px;padding:4px 10px;font-size:13px;font-weight:700;color:#fff}
    .stock-input{border:1px solid var(--border);border-radius:6px;padding:4px 8px;text-align:center;font-size:14px;font-weight:600;background:var(--surface);color:var(--text)}
    .stock-input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px #bfdbfe}
    .archived-banner{background:#fef9c3;border:1px solid #eab308;border-radius:8px;padding:8px 14px;margin-bottom:14px;font-size:13px;color:#854d0e;font-weight:600;display:flex;justify-content:space-between;align-items:center}
    .dark .archived-banner{background:#451a03;border-color:#f59e0b;color:#fcd34d}
    .log-item{border-bottom:1px solid var(--border);padding:10px 0;font-size:13px}
    .log-item:last-child{border-bottom:none}
    .cat-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
    .cat-item input{flex:1}
    .supplier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .supplier-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
    .tag{background:var(--surface2);color:var(--accent);border-radius:12px;padding:2px 10px;font-size:12px;display:inline-block;margin:2px}
    .summary-cards{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .summary-card{flex:1;min-width:140px;border-radius:10px;padding:12px 16px;border:1px solid;background:var(--surface)}

    /* MOBILE */
    @media(max-width:768px){
      .sidebar{transform:translateX(-220px)}
      .sidebar.mobile-open{transform:translateX(0)}
      .main{margin-left:0}
      .task-cols{grid-template-columns:1fr}
      .schedule-grid{grid-template-columns:100px repeat(7,1fr);font-size:10px}
      .page{padding:16px}
      .topbar{padding:10px 16px}
    }
  </style>
</head>
<body>
<div id="login-screen"></div>
<div id="app-shell" style="display:none">
  <div class="app-wrap">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-name">BOCHICA</div>
        <div class="logo-sub">Restaurant Colombien</div>
        <div class="logo-bar"><div style="flex:1;background:#f5a623"></div><div style="flex:1;background:#4a90e2"></div><div style="flex:1;background:#e74c3c"></div></div>
      </div>
      <div class="sidebar-nav" id="sidebar-nav"></div>
      <div class="sidebar-bottom">
        <button class="btn-icon-sm" onclick="toggleDark()" title="Mode sombre" id="dark-btn">🌙</button>
        <button class="btn-icon-sm" onclick="logout()" title="Déconnexion">↩ Déconnexion</button>
      </div>
    </div>
    <div class="main" id="main-area">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn-icon-sm" onclick="toggleSidebar()" style="border:1px solid var(--border);color:var(--text2)">☰</button>
          <span class="topbar-title" id="topbar-title">Inventaire</span>
        </div>
        <div class="topbar-right">
          <span id="topbar-alert"></span>
          <span style="font-size:13px;color:var(--text3)" id="topbar-role"></span>
        </div>
      </div>
      <div id="page-content"></div>
    </div>
  </div>
</div>

<!-- All modals -->
<div id="modals"></div>

<script>
const ADMIN_PIN="0000", EMPLOYEE_PIN="1111";
const DEFAULT_SECTIONS=["Cuisine","Emballage","Bar","Autre"];
const TODAY_KEY=new Date().toISOString().slice(0,10);
const DAYS_FR=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const STATUS_ORDER={"red":0,"yellow":1,"green":2};
const TASK_COLS=["À faire","En cours","Complété"];
const MENU_CATS=["Entrées","Plats principaux","Desserts","Boissons","Autres"];
const EXPENSE_CATS=["Nourriture","Boissons","Équipement","Salaires","Autre"];
const SHIFT_TYPES=[{label:"Matin",color:"#3b82f6"},{label:"Soir",color:"#8b5cf6"},{label:"Journée",color:"#22c55e"},{label:"Congé",color:"#94a3b8"}];

firebase.initializeApp({apiKey:"AIzaSyC27HzALz_DoIN5huqGwVBsKTLHg37rUuc",authDomain:"bochica-inventaire.firebaseapp.com",projectId:"bochica-inventaire",storageBucket:"bochica-inventaire.firebasestorage.app",messagingSenderId:"261321722710",appId:"1:261321722710:web:5a7aa0039fa0fd1a20a4f7"});
const db=firebase.firestore();

let products=[],suppliers=[],customSections=[],logs=[],employees=[],tasks=[],menuItems=[],expenses=[];
let isAdmin=false,isLoggedIn=false,pinBuffer="",darkMode=false;
let activeSection="Toutes",searchQuery="",sectionsExpanded=false,showArchived=false,logFilter="";
let activePage="inventaire";
let activeMenuCat="Toutes",activeExpensePeriod="mois",activeTaskCol="";
let sidebarOpen=true;
let pendingConfirm=null,openDropId=null;
let dragSrcId=null;

// State for edit modals
let editingProduct=null,editingSupplier=null,editingEmployee=null,editingTask=null,editingMenuItem=null,editingExpense=null;
let noteProductId=null,movingProductId=null,receivingProduct=null;
let shiftModal={emp:null,day:null};

function genId(){return Math.random().toString(36).slice(2,10);}
function getAllSections(){return["Toutes",...DEFAULT_SECTIONS,...customSections];}
function getCurrentStock(p){return Number(p.currentStock??0);}
function getStatus(p){const s=getCurrentStock(p),m=Number(p.minimum||0);if(s<=m)return"red";if(s<=m*1.2)return"yellow";return"green";}
function statusLabel(st){return st==="red"?"⚠️ Commander":st==="yellow"?"🟡 Bientôt bas":"✅ OK";}
function orderLabel(p){const q=p.orderQty||0;return p.orderUnit==="boîte"?`${q} boîte${q>1?"s":""}`:`${q} unité${q>1?"s":""}`;}
function fmtDate(ts){if(!ts)return"";const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString("fr-CA",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function fmtMoney(n){return`${Number(n||0).toFixed(2)} $`;}
function esc(s){return(s||"").replace(/'/g,"\\'").replace(/"/g,"&quot;");}

// ── Dark mode ────────────────────────────────────────────
function initDark(){darkMode=localStorage.getItem("bochica-dark")==="1";applyDark();}
function toggleDark(){darkMode=!darkMode;localStorage.setItem("bochica-dark",darkMode?"1":"0");applyDark();renderPage();}
function applyDark(){document.body.classList.toggle("dark",darkMode);const b=document.getElementById("dark-btn");if(b)b.textContent=darkMode?"☀️":"🌙";}
initDark();

// ── Firebase listeners ───────────────────────────────────
db.collection("products").onSnapshot(snap=>{products=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.sortOrder??999)-(b.sortOrder??999));if(isLoggedIn)renderPage();});
db.collection("suppliers").onSnapshot(snap=>{suppliers=snap.docs.map(d=>({id:d.id,...d.data()}));if(isLoggedIn)renderPage();});
db.collection("settings").doc("sections").onSnapshot(snap=>{customSections=snap.exists?snap.data().custom||:[];if(isLoggedIn)renderPage();});
db.collection("logs").orderBy("ts","desc").limit(300).onSnapshot(snap=>{logs=snap.docs.map(d=>({id:d.id,...d.data()}));if(isLoggedIn&&activePage==="historique")renderPage();});
db.collection("employees").onSnapshot(snap=>{employees=snap.docs.map(d=>({id:d.id,...d.data()}));if(isLoggedIn&&activePage==="employes")renderPage();});
db.collection("tasks").onSnapshot(snap=>{tasks=snap.docs.map(d=>({id:d.id,...d.data()}));if(isLoggedIn&&["taches","inventaire"].includes(activePage))renderPage();});
db.collection("menu").onSnapshot(snap=>{menuItems=snap.docs.map(d=>({id:d.id,...d.data()}));if(isLoggedIn&&activePage==="menu")renderPage();});
db.collection("expenses").orderBy("date","desc").limit(500).onSnapshot(snap=>{expenses=snap.docs.map(d=>({id:d.id,...d.data()}));if(isLoggedIn&&activePage==="depenses")renderPage();});

async function addLog(productName,action,detail){await db.collection("logs").add({productName,action,detail,ts:firebase.firestore.FieldValue.serverTimestamp(),role:isAdmin?"admin":"employé"});}

// ── Login ────────────────────────────────────────────────
function showLogin(){
  document.getElementById("login-screen").innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#1e293b,#334155);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
    <div style="margin-bottom:28px;text-align:center">
      <div style="font-weight:900;font-size:32px;letter-spacing:6px;color:#fff">BOCHICA</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.55);letter-spacing:2px;margin-top:4px">Restaurant Colombien</div>
      <div style="display:flex;height:3px;width:170px;margin:10px auto 0"><div style="flex:1;background:#f5a623"></div><div style="flex:1;background:#4a90e2"></div><div style="flex:1;background:#e74c3c"></div></div>
    </div>
    <div style="background:var(--surface);border-radius:20px;padding:28px;width:100%;max-width:310px;box-shadow:0 25px 60px rgba(0,0,0,0.3)">
      <h2 style="text-align:center;color:var(--text);font-size:17px;margin-bottom:4px">Connexion</h2>
      <p style="text-align:center;color:var(--text3);font-size:12px;margin-bottom:18px">Entrez votre code PIN</p>
      <div class="pin-pad">
        <div class="pin-display"><div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div><div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div></div>
        <div class="pin-error" id="pin-error"></div>
        <div class="pin-grid">
          ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-btn" onclick="pinPress('${n}')">${n}</button>`).join("")}
          <button class="pin-btn" onclick="pinClear()" style="font-size:11px">Effacer</button>
          <button class="pin-btn" onclick="pinPress('0')">0</button>
          <button class="pin-btn" onclick="pinBackspace()" style="font-size:16px">⌫</button>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById("login-screen").style.display="block";
  document.getElementById("app-shell").style.display="none";
}
function logout(){isAdmin=false;isLoggedIn=false;pinBuffer="";document.getElementById("app-shell").style.display="none";document.getElementById("login-screen").style.display="block";showLogin();}
function pinPress(d){if(pinBuffer.length>=4)return;pinBuffer+=d;updatePinDots();if(pinBuffer.length===4)checkPin();}
function pinClear(){pinBuffer="";updatePinDots();}
function pinBackspace(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();}
function updatePinDots(){for(let i=0;i<4;i++){const d=document.getElementById("dot"+i);if(d)d.classList.toggle("filled",i<pinBuffer.length);}}
function checkPin(){
  if(pinBuffer===ADMIN_PIN){isAdmin=true;isLoggedIn=true;document.getElementById("login-screen").style.display="none";document.getElementById("app-shell").style.display="block";buildSidebar();renderPage();}
  else if(pinBuffer===EMPLOYEE_PIN){isAdmin=false;isLoggedIn=true;document.getElementById("login-screen").style.display="none";document.getElementById("app-shell").style.display="block";buildSidebar();renderPage();}
  else{const e=document.getElementById("pin-error");if(e)e.textContent="❌ Code PIN incorrect";pinBuffer="";updatePinDots();}
}
showLogin();

// ── Sidebar ──────────────────────────────────────────────
function buildSidebar(){
  const nav=document.getElementById("sidebar-nav"); if(!nav)return;
  const employeeNav=[{icon:"📦",label:"Inventaire",page:"inventaire"},{icon:"📋",label:"Mes tâches",page:"taches"}];
  const adminNav=[
    {section:"INVENTAIRE"},{icon:"📦",label:"Inventaire",page:"inventaire"},{icon:"📋",label:"Historique",page:"historique"},
    {section:"DASHBOARD"},{icon:"📋",label:"Tâches",page:"taches"},{icon:"👥",label:"Employés & Horaires",page:"employes"},
    {icon:"💰",label:"Dépenses",page:"depenses"},{icon:"🍽️",label:"Menu",page:"menu"},
    {section:"GESTION"},{icon:"🏪",label:"Fournisseurs",page:"fournisseurs"},
  ];
  const items=isAdmin?adminNav:employeeNav;
  nav.innerHTML=items.map(item=>{
    if(item.section) return`<div class="nav-section">${item.section}</div>`;
    return`<div class="nav-item ${activePage===item.page?"active":""}" onclick="navTo('${item.page}')">${item.icon?`<span class="icon">${item.icon}</span>`:""}<span>${item.label}</span></div>`;
  }).join("");
  document.getElementById("topbar-role").textContent=isAdmin?"👑 Admin":"👤 Employé";
}
function navTo(page){activePage=page;searchQuery="";buildSidebar();renderPage();if(window.innerWidth<=768){document.getElementById("sidebar").classList.remove("mobile-open");}}
function toggleSidebar(){if(window.innerWidth<=768){document.getElementById("sidebar").classList.toggle("mobile-open");}else{sidebarOpen=!sidebarOpen;document.getElementById("sidebar").classList.toggle("hidden",!sidebarOpen);document.getElementById("main-area").classList.toggle("full",!sidebarOpen);}}

// ── Dropdown ─────────────────────────────────────────────
function toggleDrop(id){closeAllDrops();if(openDropId===id){openDropId=null;return;}const el=document.getElementById("drop-"+id);if(el){el.classList.add("open");openDropId=id;}}
function closeAllDrops(){document.querySelectorAll(".dropdown.open").forEach(el=>el.classList.remove("open"));openDropId=null;}
document.addEventListener("click",e=>{if(!e.target.closest(".menu-wrap"))closeAllDrops();});

// ── Confirm modal ────────────────────────────────────────
function openConfirm(title,msg,action,isDanger=false){
  pendingConfirm=action;
  showModal(`<div class="modal" style="max-width:380px">
    <div class="modal-header"><h3>${title}</h3></div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px;line-height:1.6">${msg}</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button style="background:${isDanger?"#ef4444":"#22c55e"};color:#fff;border:none;border-radius:8px;padding:8px 18px;font-weight:600;cursor:pointer;font-size:14px" onclick="confirmAction()">${isDanger?"Supprimer":"Confirmer"}</button>
    </div>
  </div>`);
}
function confirmAction(){if(pendingConfirm)pendingConfirm();closeModal();}
function showModal(html){document.getElementById("modals").innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;}
function closeModal(){document.getElementById("modals").innerHTML="";}

// ── Page renderer ────────────────────────────────────────
function renderPage(){
  const pageLabels={inventaire:"📦 Inventaire",historique:"📋 Historique",taches:"📋 Tâches",employes:"👥 Employés & Horaires",depenses:"💰 Dépenses",menu:"🍽️ Menu",fournisseurs:"🏪 Fournisseurs"};
  document.getElementById("topbar-title").textContent=pageLabels[activePage]||activePage;
  const lowCount=products.filter(p=>!p.archived&&["red","yellow"].includes(getStatus(p))).length;
  const al=document.getElementById("topbar-alert");
  if(al)al.innerHTML=lowCount>0?`<div class="alert-pill">⚠️ ${lowCount}</div>`:"";
  const pc=document.getElementById("page-content"); if(!pc)return;
  if(activePage==="inventaire")pc.innerHTML=renderInventaire();
  else if(activePage==="historique"&&isAdmin)pc.innerHTML=renderHistorique();
  else if(activePage==="taches")pc.innerHTML=renderTaches();
  else if(activePage==="employes"&&isAdmin)pc.innerHTML=renderEmployes();
  else if(activePage==="depenses"&&isAdmin)pc.innerHTML=renderDepenses();
  else if(activePage==="menu"&&isAdmin)pc.innerHTML=renderMenu();
  else if(activePage==="fournisseurs")pc.innerHTML=renderFournisseurs();
  else pc.innerHTML=`<div class="page"><div class="empty">Accès non autorisé.</div></div>`;
}

// ══════════════════════════════════════════════════════════
// INVENTAIRE
// ══════════════════════════════════════════════════════════
function renderInventaire(){
  const activeProducts=products.filter(p=>!p.archived);
  const archivedProducts=products.filter(p=>p.archived);
  const lowCount=activeProducts.filter(p=>["red","yellow"].includes(getStatus(p))).length;
  const isMobile=window.innerWidth<=640;
  const allSec=getAllSections();
  const displayProducts=showArchived?archivedProducts:activeProducts;
  const filtered=displayProducts.filter(p=>(activeSection==="Toutes"||p.section===activeSection)&&(searchQuery===""||p.name.toLowerCase().includes(searchQuery.toLowerCase()))).sort((a,b)=>STATUS_ORDER[getStatus(a)]-STATUS_ORDER[getStatus(b)]);
  const visibleSecs=(!isMobile||sectionsExpanded)?allSec:allSec.slice(0,4);
  const hasMore=isMobile&&allSec.length>4;

  let h=`<div class="page">`;
  if(isAdmin&&archivedProducts.length>0){
    h+=`<div class="archived-banner"><span>📦 ${archivedProducts.length} produit${archivedProducts.length>1?"s":""} archivé${archivedProducts.length>1?"s":""}</span><button onclick="toggleShowArchived()" style="border:1px solid #eab308;background:none;color:#854d0e;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:600">${showArchived?"Voir actifs":"Voir archivés"}</button></div>`;
  }
  if(!showArchived){
    h+=`<div class="section-tabs ${sectionsExpanded?"expanded":""}">`;
    visibleSecs.forEach(s=>{
      const cnt=s==="Toutes"?lowCount:activeProducts.filter(p=>p.section===s&&["red","yellow"].includes(getStatus(p))).length;
      h+=`<button class="sec-btn ${s===activeSection?"active":""}" onclick="setSection('${s}')">${s}${cnt>0?`<span class="badge-count">${cnt}</span>`:""}</button>`;
    });
    if(hasMore)h+=`<button class="sec-toggle" onclick="toggleSections()">${sectionsExpanded?"▲":"▼"}</button>`;
    if(isAdmin)h+=`<button class="sec-btn" onclick="openCategoryModal()" style="border-style:dashed;color:var(--text3)">⚙️</button>`;
    h+=`</div>`;
  }
  h+=`<div class="toolbar">
    <div class="search-box"><span style="color:var(--text3)">🔍</span><input type="text" placeholder="Rechercher..." value="${searchQuery}" oninput="setSearch(this.value)"/></div>
    ${isAdmin&&!showArchived?`<button class="btn btn-primary" onclick="openProductModal()">+ Produit</button>`:""}
  </div>`;

  if(!filtered.length){h+=`<div class="empty"><div style="font-size:36px;margin-bottom:8px">${searchQuery?"🔍":"📭"}</div>${searchQuery?"Aucun résultat":showArchived?"Aucun produit archivé":"Aucun produit dans cette section."}</div>`;}
  else if(isMobile){filtered.forEach(p=>{h+=buildInvCard(p,true,false);});} 
  else{
    h+=`<div class="table-wrap overflow"><table><thead><tr>
      ${isAdmin?`<th style="width:30px"></th>`:""}
      <th>Produit</th><th>Stock actuel</th><th>Mettre à jour</th><th>Minimum</th><th>Fournisseur</th><th>Statut</th><th>À commander</th>
      ${isAdmin?`<th></th>`:""}
    </tr></thead><tbody id="product-tbody">`;
    filtered.forEach(p=>{
      const st=getStatus(p),stock=getCurrentStock(p);
      const sup=suppliers.find(s=>s.id===p.supplierId);
      const borderColor=st==="red"?"#ef4444":st==="yellow"?"#eab308":"#22c55e";
      const nameColor=st==="red"?"#991b1b":st==="yellow"?"#854d0e":darkMode?"#f1f5f9":"#1e293b";
      h+=`<tr data-id="${p.id}" style="border-left:3px solid ${borderColor}" ${isAdmin&&!showArchived?`draggable="true" ondragstart="dragStart(event,'${p.id}')" ondragover="dragOver(event,'${p.id}')" ondrop="dropOn(event,'${p.id}')" ondragleave="dragLeave(event)" ondragend="dragEnd(event)"`:""}> 
        ${isAdmin?`<td style="padding:0 4px">${!showArchived?`<span class="drag-handle">⠿</span>`:""}</td>`:""}
        <td><strong style="color:${nameColor}">${p.name}</strong>${activeSection==="Toutes"?`<div style="font-size:11px;color:var(--text3)">${p.section}</div>`:""}${p.note?`<div style="font-size:11px;color:var(--text3);font-style:italic;margin-top:2px">📝 ${p.note}</div>`:""}</td>
        <td><span style="font-weight:700;color:${borderColor}">${stock}</span></td>
        <td>${!showArchived?`<input class="stock-input" type="number" placeholder="Qté restante" id="si_${p.id}" style="width:100px" onkeydown="if(event.key==='Enter')commitStock('${p.id}','si_${p.id}')" onblur="commitStock('${p.id}','si_${p.id}')"/>`:"—"}</td>
        <td style="text-align:center">${p.minimum||0}</td>
        <td style="font-size:13px;color:var(--text2)">${sup?sup.name:"—"}</td>
        <td><span class="badge-pill ${st}">${statusLabel(st)}</span></td>
        <td style="font-weight:600;color:var(--accent)">${orderLabel(p)}${p.orderUnit==="boîte"?`<div style="font-size:11px;color:var(--text3)">${(p.orderQty||0)*(p.unitsPerBox||1)} unités</div>`:""}</td>
        ${isAdmin?`<td><div class="menu-wrap"><button class="dots-btn" onclick="toggleDrop('${p.id}')">⋯</button><div class="dropdown" id="drop-${p.id}">
          <button onclick="openProductModal('${p.id}');closeAllDrops()">✏️ Modifier</button>
          <button onclick="openNoteModal('${p.id}');closeAllDrops()">📝 Note</button>
          <button onclick="openMoveModal('${p.id}');closeAllDrops()">📁 Changer catégorie</button>
          <button onclick="doToggleArchive('${p.id}','${esc(p.name)}',${!!p.archived});closeAllDrops()">${p.archived?"📤 Restaurer":"📦 Archiver"}</button>
          <div class="sep"></div>
          <button style="color:#ef4444" onclick="askDelete('products','${p.id}','${esc(p.name)}');closeAllDrops()">🗑️ Supprimer</button>
        </div></div></td>`:""}
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  return h+`</div>`;
}

function buildInvCard(p,showInput,showOrderBtn){
  const st=getStatus(p),stock=getCurrentStock(p);
  const borderColor=st==="red"?"#ef4444":st==="yellow"?"#eab308":"#22c55e";
  const nameColor=st==="red"?"#991b1b":st==="yellow"?"#854d0e":darkMode?"#f1f5f9":"#1e293b";
  const stockColor=st==="red"?"#ef4444":st==="yellow"?"#f59e0b":"#22c55e";
  const sup=p.supplierId?suppliers.find(s=>s.id===p.supplierId):null;
  const oq=p.orderQty||0, upb=p.unitsPerBox||1;
  const oLabel=p.orderUnit==="boîte"?`${oq} boîte${oq>1?"s":""}`:`${oq} unité${oq>1?"s":""}`;
  const units=oq*(p.orderUnit==="boîte"?upb:1);
  const inputId=`si_m${p.id}`;
  return`<div class="inv-card" style="border:1px solid ${borderColor}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${p.note?4:12}px">
      <div style="flex:1"><div style="font-weight:700;font-size:15px;color:${nameColor}">${p.name}</div>
        ${showOrderBtn&&sup?`<div style="font-size:12px;color:var(--text2);margin-top:2px">🏪 ${sup.name}${sup.contact?` · ${sup.contact}`:""}</div>`:""}
        ${activeSection==="Toutes"&&!showOrderBtn?`<div style="font-size:11px;color:var(--text3)">${p.section}</div>`:""}
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px">
        <span class="badge-pill ${st}">${statusLabel(st)}</span>
        ${isAdmin&&showInput?`<div class="menu-wrap"><button class="dots-btn" onclick="toggleDrop('m${p.id}')">⋯</button><div class="dropdown" id="drop-m${p.id}">
          <button onclick="openProductModal('${p.id}');closeAllDrops()">✏️ Modifier</button>
          <button onclick="openNoteModal('${p.id}');closeAllDrops()">📝 Note</button>
          <button onclick="openMoveModal('${p.id}');closeAllDrops()">📁 Changer catégorie</button>
          <button onclick="doToggleArchive('${p.id}','${esc(p.name)}',${!!p.archived});closeAllDrops()">${p.archived?"📤 Restaurer":"📦 Archiver"}</button>
          <div class="sep"></div>
          <button style="color:#ef4444" onclick="askDelete('products','${p.id}','${esc(p.name)}');closeAllDrops()">🗑️ Supprimer</button>
        </div></div>`:""}
      </div>
    </div>
    ${p.note?`<div class="note-badge" style="margin-bottom:10px">📝 ${p.note}</div>`:""}
    <div class="inv-card-body">
      <div class="inv-card-block"><div class="inv-card-label">Stock actuel</div><div class="inv-card-value" style="color:${stockColor}">${stock}</div><div class="inv-card-sub">Min : ${p.minimum||0} · Cmd : ${oLabel}</div></div>
      ${showInput?`<div class="inv-card-block" style="display:flex;flex-direction:column"><div class="inv-card-label">Mettre à jour</div><input class="stock-input" type="number" placeholder="Qté restante" id="${inputId}" onkeydown="if(event.key==='Enter')commitStock('${p.id}','${inputId}')" onblur="commitStock('${p.id}','${inputId}')" style="width:100%;height:38px;font-size:15px;margin-top:6px"/></div>`:""}
      ${showOrderBtn?`<div class="inv-card-block"><div class="inv-card-label">À commander</div><div style="font-weight:700;font-size:15px;color:var(--accent);margin-top:4px">${oLabel}</div>${p.orderUnit==="boîte"?`<div style="font-size:11px;color:var(--text3)">${units} unités</div>`:""}</div>`:""}
    </div>
    ${showOrderBtn?`<button onclick="openReceiveModal('${p.id}')" style="width:100%;margin-top:12px;background:#22c55e;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:700;cursor:pointer">📦 Réceptionner la commande</button>`:""}
  </div>`;
}

            <div style="flex:1">
              <div style="font-weight:600;font-size:14px;display:flex;align-items:center">

              </div>
              ${t.description?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${t.description}</div>`:""}
              <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
                ${t.assignedTo?`<span style="font-size:11px;color:var(--text3)">👤 ${t.assignedTo}</span>`:""}
                ${t.dueDate?`<span style="font-size:11px;color:var(--text3)">📅 ${t.dueDate}</span>`:""}
              </div>
            </div>
            ${isAdmin?`<div class="menu-wrap" onclick="event.stopPropagation()"><button class="dots-btn" onclick="toggleDrop('tk${t.id}')">⋯</button><div class="dropdown" id="drop-tk${t.id}">
              <button onclick="openTaskModal('${t.id}');closeAllDrops()">✏️ Modifier</button>
              <div class="sep"></div>
              <button style="color:#ef4444" onclick="askDelete('tasks','${t.id}','${esc(t.title||"")}');closeAllDrops()">🗑️ Supprimer</button>
            </div></div>`:""}
          </div>
        </div>`).join("")}
        ${isAdmin?`<button onclick="openTaskModal(null,'${col}')" style="width:100%;border:1px dashed var(--border);background:none;color:var(--text3);border-radius:8px;padding:8px;cursor:pointer;font-size:13px;margin-top:4px">+ Ajouter</button>`:""}
      </div>`;
    }).join("")}
    </div>
  </div>`;
}
async function cycleTaskStatus(id,current){
  const idx=TASK_COLS.indexOf(current);
  const next=TASK_COLS[(idx+1)%TASK_COLS.length];
  await db.collection("tasks").doc(id).update({status:next});
}

function renderEmployes(){
  const weekStart=getWeekStart();
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d;});

    <div class="toolbar">
      <h2 style="font-size:18px">Employés & Horaires</h2>

        <div style="display:flex;gap:6px">${SHIFT_TYPES.map(s=>`<span style="background:${s.color};color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600">${s.label}</span>`).join("")}</div>

function getWeekStart(){const d=new Date();const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);d.setHours(0,0,0,0);return d;}

async function removeShift(empId,dayKey){
  const emp=employees.find(e=>e.id===empId);if(!emp)return;
  const shifts={...emp.shifts||{}};delete shifts[dayKey];
  await db.collection("employees").doc(empId).update({shifts});
}

function renderDepenses(){
  const now=new Date();
  const filtered=expenses.filter(e=>{
    const d=new Date(e.date);
    if(activeExpensePeriod==="semaine"){const diff=(now-d)/(1000*60*60*24);return diff<=7;}
    if(activeExpensePeriod==="mois"){return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
    return d.getFullYear()===now.getFullYear();
  });
  const total=filtered.reduce((s,e)=>s+Number(e.amount||0),0);
  const bycat=EXPENSE_CATS.map(c=>({cat:c,total:filtered.filter(e=>e.category===c).reduce((s,e)=>s+Number(e.amount||0),0)}));
  return`<div class="page">
    <div class="toolbar">
      <h2 style="font-size:18px">Dépenses</h2>
      <button class="btn btn-primary" onclick="openExpenseModal()">+ Dépense</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      ${["semaine","mois","année"].map(p=>`<button class="sec-btn ${activeExpensePeriod===p?"active":""}" onclick="setExpensePeriod('${p}')">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`).join("")}
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${fmtMoney(total)}</div><div class="stat-label">Total dépenses</div></div>
      ${bycat.filter(c=>c.total>0).map(c=>`<div class="stat-card"><div class="stat-num" style="font-size:20px">${fmtMoney(c.total)}</div><div class="stat-label">${c.cat}</div></div>`).join("")}
    </div>
    <div class="table-wrap overflow">
      <table><thead><tr><th>Date</th><th>Description</th><th>Catégorie</th><th>Fournisseur</th><th>Montant</th><th></th></tr></thead><tbody>
      ${filtered.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:24px">Aucune dépense pour cette période.</td></tr>`:
      filtered.map(e=>`<tr>
        <td>${e.date||""}</td>
        <td><strong>${e.description||""}</strong></td>
        <td><span class="badge-pill blue">${e.category||""}</span></td>
        <td>${e.supplier||"—"}</td>
        <td style="font-weight:700;color:var(--accent)">${fmtMoney(e.amount)}</td>
        <td><div class="menu-wrap"><button class="dots-btn" onclick="toggleDrop('exp${e.id}')">⋯</button><div class="dropdown" id="drop-exp${e.id}">
          <button onclick="openExpenseModal('${e.id}');closeAllDrops()">✏️ Modifier</button>
          <div class="sep"></div>
          <button style="color:#ef4444" onclick="askDelete('expenses','${e.id}','${esc(e.description||"")}');closeAllDrops()">🗑️ Supprimer</button>
        </div></div></td>
      </tr>`).join("")}
      </tbody></table>
    </div>
  </div>`;
}

function toggleBoxFields(){const isBox=document.getElementById("p-orderunit")?.value==="boîte";document.getElementById("box-fields").style.display=isBox?"block":"none";document.getElementById("unit-fields").style.display=isBox?"none":"block";}
async function saveProduct(id){
  const name=document.getElementById("p-name").value.trim();if(!name)return alert("Entrez un nom.");
  const orderUnit=document.getElementById("p-orderunit").value;
  const isBox=orderUnit==="boîte";
  const orderQty=isBox?Number(document.getElementById("p-oqty").value):Number(document.getElementById("p-oqty-u").value);
  const data={name,unit:"unité",orderUnit,orderQty,unitsPerBox:isBox?Number(document.getElementById("p-upb").value):1,minimum:Number(document.getElementById("p-minimum").value),currentStock:Number(document.getElementById("p-stock").value),section:document.getElementById("p-section").value,supplierId:document.getElementById("p-sup").value};
  if(id){const p=products.find(x=>x.id===id);await db.collection("products").doc(id).set({...p,...data,id});await addLog(name,"Modifié","");}
  else{const nid=genId();await db.collection("products").doc(nid).set({...data,id:nid,sortOrder:products.length,archived:false});await addLog(name,"Ajouté","");}

// Receive
function openReceiveModal(id){
  const p=products.find(x=>x.id===id);if(!p)return;receivingProduct=p;
  const isBox=p.orderUnit==="boîte";const upb=p.unitsPerBox||1;const dq=p.orderQty||0;const stock=getCurrentStock(p);
  showModal(`<div class="modal" style="max-width:400px">
    <div class="modal-header"><h3>📦 Réception — ${p.name}</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--text2)">
      Stock actuel : <strong>${stock} unités</strong><br>Commande prévue : <strong>${orderLabel(p)}</strong>${isBox?` (${dq*upb} unités)`:""}
    </div>
    <label>Quantité reçue<input id="recv-qty" type="number" value="${dq}" oninput="updateRecvPreview()" min="0"/><span class="field-hint">${isBox?`Nombre de boîtes (${upb} unités/boîte)`:"Nombre d'unités"}</span></label>
    <div id="recv-preview" style="font-size:13px;color:var(--text2);min-height:20px;margin-bottom:8px"></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="confirmReceive()">✅ Confirmer</button></div>
  </div>`);
  setTimeout(updateRecvPreview,50);
}
function updateRecvPreview(){
  const p=receivingProduct;if(!p)return;
  const qty=Number(document.getElementById("recv-qty")?.value)||0;
  const isBox=p.orderUnit==="boîte";const units=qty*(isBox?(p.unitsPerBox||1):1);
  const newStock=getCurrentStock(p)+units;
  const expected=(p.orderQty||0)*(isBox?(p.unitsPerBox||1):1);
  const diff=units-expected;
  const el=document.getElementById("recv-preview");
  if(el)el.innerHTML=`Ajouter <strong>${units} unité${units!==1?"s":""}</strong> → Nouveau stock : <strong>${newStock}</strong>${diff<0?`<br><span style="color:#ef4444">▼ ${Math.abs(diff)} unités de moins que prévu</span>`:diff>0?`<br><span style="color:#22c55e">▲ ${diff} unités de plus que prévu</span>`:""}`;
}
async function confirmReceive(){
  const p=receivingProduct;if(!p)return;
  const qty=Number(document.getElementById("recv-qty").value)||0;
  const isBox=p.orderUnit==="boîte";const units=qty*(isBox?(p.unitsPerBox||1):1);
  const old=getCurrentStock(p);const newStock=old+units;
  await db.collection("products").doc(p.id).update({currentStock:newStock});
  await addLog(p.name,"Réception",`+${units} unités (${qty} ${p.orderUnit}${qty>1?"s":""}) · ${old} → ${newStock}`);
  receivingProduct=null;closeModal();
}

    <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Sélectionnez le type de quart :</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${SHIFT_TYPES.map(s=>`<button onclick="assignShift('${empId}','${dayKey}','${s.label}','${s.color}')" style="background:${s.color};color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer">${s.label}</button>`).join("")}
    </div>
    <div class="modal-actions" style="margin-top:12px"><button class="btn-cancel" onclick="closeModal()">Annuler</button></div>
  </div>`);
}
async function assignShift(empId,dayKey,label,color){
  const emp=employees.find(e=>e.id===empId);if(!emp)return;
  const shifts={...emp.shifts||{},[dayKey]:{label,color}};
  await db.collection("employees").doc(empId).update({shifts});
  closeModal();
}

// Expense
function openExpenseModal(id){
  const e=id?expenses.find(x=>x.id===id):null;
  const today=new Date().toISOString().slice(0,10);
  showModal(`<div class="modal">
    <div class="modal-header"><h3>${e?"Modifier":"Ajouter"} une dépense</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <label>Description<input id="ex-desc" value="${esc(e?.description||"")}"/></label>
    <div class="form-row">
      <label>Montant ($)<input id="ex-amt" type="number" step="0.01" value="${e?.amount||""}"/></label>
      <label>Date<input id="ex-date" type="date" value="${e?.date||today}"/></label>
    </div>
    <div class="form-row">
      <label>Catégorie<select id="ex-cat">${EXPENSE_CATS.map(c=>`<option value="${c}" ${e?.category===c?"selected":""}>${c}</option>`).join("")}</select></label>
      <label>Fournisseur<input id="ex-sup" value="${esc(e?.supplier||"")}" placeholder="Optionnel"/></label>
    </div>
    <label>Notes<textarea id="ex-notes" style="height:60px">${e?.notes||""}</textarea></label>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveExpense('${id||""}')">Enregistrer</button></div>
  </div>`);
}
async function saveExpense(id){
  const desc=document.getElementById("ex-desc").value.trim();if(!desc)return alert("Entrez une description.");
  const data={description:desc,amount:Number(document.getElementById("ex-amt").value)||0,date:document.getElementById("ex-date").value,category:document.getElementById("ex-cat").value,supplier:document.getElementById("ex-sup").value,notes:document.getElementById("ex-notes").value};
  if(id)await db.collection("expenses").doc(id).update(data);
  else{const nid=genId();await db.collection("expenses").doc(nid).set({...data,id:nid});}
  closeModal();
}

// Menu item
function openMenuModal(id){
  const m=id?menuItems.find(x=>x.id===id):null;
  showModal(`<div class="modal">
    <div class="modal-header"><h3>${m?"Modifier":"Ajouter"} un item au menu</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <label>Nom<input id="mn-name" value="${esc(m?.name||"")}"/></label>
    <label>Description<textarea id="mn-desc" style="height:70px">${m?.description||""}</textarea></label>
    <div class="form-row">
      <label>Prix ($)<input id="mn-price" type="number" step="0.01" value="${m?.price||""}"/></label>
      <label>Catégorie<select id="mn-cat">${MENU_CATS.map(c=>`<option value="${c}" ${(m?.category||"Plats principaux")===c?"selected":""}>${c}</option>`).join("")}</select></label>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveMenuItem('${id||""}')">Enregistrer</button></div>
  </div>`);
}
async function saveMenuItem(id){
  const name=document.getElementById("mn-name").value.trim();if(!name)return alert("Entrez un nom.");
  const data={name,description:document.getElementById("mn-desc").value,price:Number(document.getElementById("mn-price").value)||0,category:document.getElementById("mn-cat").value,available:true};
  if(id)await db.collection("menu").doc(id).update(data);
  else{const nid=genId();await db.collection("menu").doc(nid).set({...data,id:nid});}
  closeModal();
}

// Supplier
function openSupplierModal(id){
  const s=id?suppliers.find(x=>x.id===id):null;
  showModal(`<div class="modal">
    <div class="modal-header"><h3>${s?"Modifier":"Ajouter"} un fournisseur</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <label>Nom<input id="s-name" value="${esc(s?.name||"")}"/></label>
    <label>Téléphone<input id="s-contact" value="${esc(s?.contact||"")}"/></label>
    <label>Courriel<input id="s-email" value="${esc(s?.email||"")}"/></label>
    <label>Notes<textarea id="s-notes" style="height:70px">${s?.notes||""}</textarea></label>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveSupplier('${id||""}')">Enregistrer</button></div>
  </div>`);
}
async function saveSupplier(id){
  const name=document.getElementById("s-name").value.trim();if(!name)return alert("Entrez un nom.");
  const data={name,contact:document.getElementById("s-contact").value,email:document.getElementById("s-email").value,notes:document.getElementById("s-notes").value};
  if(id)await db.collection("suppliers").doc(id).update({...data});
  else{const nid=genId();await db.collection("suppliers").doc(nid).set({...data,id:nid});}
  closeModal();
}

// Category
function openCategoryModal(){
  const renderCats=()=>!customSections.length?`<p style="color:var(--text3);font-size:13px;text-align:center;margin-bottom:12px">Aucune catégorie personnalisée</p>`:customSections.map((s,i)=>`<div class="cat-item"><input value="${s}" onblur="renameCategory(${i},this.value)"/><button class="btn-danger-sm" onclick="askDeleteCategory(${i},'${esc(s)}')">🗑️</button></div>`).join("");
  showModal(`<div class="modal">
    <div class="modal-header"><h3>⚙️ Catégories</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div id="cat-list">${renderCats()}</div>
    <div style="display:flex;gap:8px;margin-top:8px"><input id="cat-new" placeholder="Nouvelle catégorie..."/><button class="btn btn-primary" onclick="addCategory()">Ajouter</button></div>
  </div>`);
}
async function addCategory(){const name=document.getElementById("cat-new").value.trim();if(!name)return;if(DEFAULT_SECTIONS.includes(name)||customSections.includes(name))return alert("Déjà existante.");await db.collection("settings").doc("sections").set({custom:[...customSections,name]});closeModal();}
async function renameCategory(i,v){const t=v.trim();if(!t||t===customSections[i])return;const u=[...customSections];u[i]=t;await db.collection("settings").doc("sections").set({custom:u});}
function askDeleteCategory(i,name){openConfirm("🗑️ Supprimer catégorie",`Supprimer "${name}" ?`,async()=>{await db.collection("settings").doc("sections").set({custom:customSections.filter((_,j)=>j!==i)});},true);}

// Generic delete
function askDelete(col,id,name){openConfirm("🗑️ Supprimer",`Supprimer "${name}" définitivement ?`,()=>db.collection(col).doc(id).delete(),true);}

// Archive
function doToggleArchive(id,name,isArchived){
  openConfirm(isArchived?"📤 Restaurer":"📦 Archiver",isArchived?`Restaurer "${name}" ?`:`Archiver "${name}" ?`,async()=>{await db.collection("products").doc(id).update({archived:!isArchived});await addLog(name,isArchived?"Restauré":"Archivé","");if(showArchived&&isArchived)showArchived=false;});
}

// Stock
async function commitStock(id,inputId){
  const input=document.getElementById(inputId);if(!input||input.value==="")return;
  const newStock=Number(input.value);const p=products.find(x=>x.id===id);if(!p)return;
  const old=getCurrentStock(p);
  await db.collection("products").doc(id).update({currentStock:newStock});
  await addLog(p.name,"Mise à jour stock",`${old} → ${newStock} unités`);
  input.value="";
}

// Drag & drop
function dragStart(e,id){dragSrcId=id;setTimeout(()=>{const tr=document.querySelector(`tr[data-id="${id}"]`);if(tr)tr.classList.add("dragging");},0);}
function dragOver(e,id){e.preventDefault();const tr=document.querySelector(`tr[data-id="${id}"]`);if(tr&&id!==dragSrcId)tr.classList.add("drag-over");}
function dragLeave(){document.querySelectorAll("tr.drag-over").forEach(r=>r.classList.remove("drag-over"));}
function dragEnd(){document.querySelectorAll("tr.dragging,tr.drag-over").forEach(r=>r.classList.remove("dragging","drag-over"));}
async function dropOn(e,targetId){e.preventDefault();dragEnd();if(!dragSrcId||dragSrcId===targetId)return;const tbody=document.getElementById("product-tbody");if(!tbody)return;const ids=[...tbody.querySelectorAll("tr[data-id]")].map(r=>r.dataset.id);const si=ids.indexOf(dragSrcId),ti=ids.indexOf(targetId);if(si<0||ti<0)return;ids.splice(si,1);ids.splice(ti,0,dragSrcId);const batch=db.batch();ids.forEach((id,i)=>batch.update(db.collection("products").doc(id),{sortOrder:i}));await batch.commit();dragSrcId=null;}

// Helpers
function setSection(s){activeSection=s;searchQuery="";renderPage();}
function setSearch(v){searchQuery=v;renderPage();}
function toggleSections(){sectionsExpanded=!sectionsExpanded;renderPage();}
function toggleShowArchived(){showArchived=!showArchived;renderPage();}
function setLogFilter(v){logFilter=v;renderPage();}
function setExpensePeriod(p){activeExpensePeriod=p;renderPage();}
function setMenuCat(c){activeMenuCat=c;renderPage();}

window.addEventListener("resize",()=>{if(isLoggedIn)renderPage();});

// Midnight reset
function scheduleMidnight(){const now=new Date(),m=new Date(now);m.setDate(now.getDate()+1);m.setHours(0,0,10,0);setTimeout(()=>{scheduleMidnight();if(isLoggedIn)renderPage();},m-now);}
scheduleMidnight();

// Print report
function printReport(){
  const activeP=products.filter(p=>!p.archived);
  const toOrder=activeP.filter(p=>["red","yellow"].includes(getStatus(p))).sort((a,b)=>STATUS_ORDER[getStatus(a)]-STATUS_ORDER[getStatus(b)]);
  const rows=toOrder.map(p=>{const sup=suppliers.find(s=>s.id===p.supplierId),st=getStatus(p),stock=getCurrentStock(p);return`<tr style="border-left:4px solid ${st==="red"?"#ef4444":"#eab308"}"><td>${p.name}</td><td>${p.section}</td><td>${stock}</td><td>${p.minimum||0}</td><td>${orderLabel(p)}${p.orderUnit==="boîte"?` (${(p.orderQty||0)*(p.unitsPerBox||1)} unités)`:""}</td><td>${sup?sup.name:"—"}</td><td>${sup?sup.contact||"—":"—"}</td><td>${statusLabel(st)}</td></tr>`;}).join("");
  const win=window.open("","_blank");
  win.document.write(`<!DOCTYPE html><html><head><title>Rapport</title><style>body{font-family:system-ui,sans-serif;padding:32px}table{width:100%;border-collapse:collapse;font-size:13px}th{padding:10px;background:#f1f5f9;text-align:left;font-size:11px;text-transform:uppercase}td{padding:10px;border-bottom:1px solid #e2e8f0}@media print{button{display:none}}</style></head><body><div style="font-size:26px;font-weight:900;letter-spacing:4px">BOCHICA</div><div style="display:flex;height:3px;width:200px;margin:6px 0 14px"><div style="flex:1;background:#f5a623"></div><div style="flex:1;background:#4a90e2"></div><div style="flex:1;background:#e74c3c"></div></div><h2>Rapport de commande</h2><p style="color:#64748b;font-size:13px;margin-bottom:16px">${new Date().toLocaleDateString("fr-CA",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p><table><thead><tr><th>Produit</th><th>Section</th><th>Stock</th><th>Min</th><th>À commander</th><th>Fournisseur</th><th>Contact</th><th>Statut</th></tr></thead><tbody>${rows}</tbody></table><br/><button onclick="window.print()" style="background:#3b82f6;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer">🖨️ Imprimer</button></body></html>`);
  win.document.close();
}
</script>
